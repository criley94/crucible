steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/deckhouse-489723/demo-repo/teamforge-api:$COMMIT_SHA', '-t', 'us-central1-docker.pkg.dev/deckhouse-489723/demo-repo/teamforge-api:latest', './api']

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/deckhouse-489723/demo-repo/teamforge-api:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/deckhouse-489723/demo-repo/teamforge-api:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'teamforge-api'
      - '--image=us-central1-docker.pkg.dev/deckhouse-489723/demo-repo/teamforge-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=3'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/deckhouse-489723/demo-repo/teamforge-api:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/deckhouse-489723/demo-repo/teamforge-api:latest'
